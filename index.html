<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>矩阵叠兵 · 编队规划器</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<noscript><div style="padding:40px;text-align:center;color:#333;background:#f4f3ef;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif">需要 JavaScript 才能运行</div></noscript>

<div class="loading-screen" id="loading-screen">
  <div class="loading-content">
    <div class="loading-spinner"><span></span></div>
    <div class="loading-brand">
      <div class="loading-logo">
        <span>矩阵叠兵</span>
        <span class="loading-ver">v1.1</span>
      </div>
      <div class="loading-author">楪之语</div>
    </div>
    <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
    <div class="loading-text" id="loading-text">加载角色数据…</div>
    <button class="btn btn-sm" id="loading-retry" style="display:none;margin-top:12px;">刷新重试</button>
  </div>
</div>

<button class="hide-btn" id="btn-hide" aria-label="隐藏内容">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
</button>

<div class="app-shell">
<header>
  <h1>矩阵叠兵 · 编队规划器</h1>
  <div class="header-actions">
    <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">
      <svg class="sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <span class="stats" id="stats-text" role="status" aria-live="polite">加载中…</span>
    <span class="save-indicator" id="save-indicator" aria-hidden="true"></span>
    <button class="btn btn-sm btn-primary" id="btn-mgmt">管理角色</button>
    <button class="btn btn-sm btn-primary" id="btn-customize">设置点数</button>
    <details class="actions-menu" id="actions-menu">
      <summary class="actions-menu-trigger" aria-label="更多操作" title="更多操作">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
      </summary>
      <div class="actions-menu-panel">
        <button class="btn btn-sm" id="btn-export">导出</button>
        <button class="btn btn-sm" id="btn-import">导入</button>
        <button class="btn btn-sm btn-danger" id="btn-reset">重置</button>
      </div>
    </details>
  </div>
</header>

<div class="container">

  <section class="section" id="pool-section">
    <div class="scroll-btn-wrapper scroll-top-wrapper"><button class="scroll-btn scroll-top" aria-label="回到顶部">↑</button></div>
    <div class="section-header">
      <div class="section-title">角色池</div>
      <span id="pool-count"></span>
    </div>
    <div class="pool-hint">拖入编队即可使用，归零自动消失</div>
    <div class="pool-filter-bar" id="pool-filter-bar">
      <input class="pool-search" id="pool-search" type="text" placeholder="搜索角色（支持拼音）…" autocomplete="off" aria-label="搜索角色">
      <div class="filter-btns" id="filter-btns"></div>
    </div>
    <div id="pool-grid"></div>
    <div id="pool-empty" class="pool-empty" style="display:none;">
      <div class="empty-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></div>
      <div id="pool-empty-text">暂无显示角色，请先点击「管理角色」显示角色。</div>
    </div>
    <div class="scroll-btn-wrapper scroll-bottom-wrapper"><button class="scroll-btn scroll-bottom" aria-label="回到底部">↓</button></div>
  </section>

  <section class="section" id="teams-section">
    <div class="scroll-btn-wrapper scroll-top-wrapper"><button class="scroll-btn scroll-top" aria-label="回到顶部">↑</button></div>
    <div class="section-header">
      <div class="section-title-group">
        <span class="section-title">编队列表</span>
        <button class="layout-toggle" id="btn-layout-toggle" aria-label="切换编队布局" title="切换单列/双列布局">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="18" rx="1" ry="1"/>
            <rect x="14" y="3" width="7" height="18" rx="1" ry="1"/>
          </svg>
        </button>
      </div>
      <span id="teams-count">0 个编队</span>
    </div>
    <div class="pool-hint">每队 3 人，拖回角色池即可移回</div>
    <div id="teams-list"></div>
    <div id="teams-empty" class="teams-empty">
      <div class="empty-text">暂无编队，拖入角色或点击下方按钮添加</div>
    </div>
    <div class="add-team-btn" id="add-team-btn">+ 添加编队</div>
    <div class="scroll-btn-wrapper scroll-bottom-wrapper"><button class="scroll-btn scroll-bottom" aria-label="回到底部">↓</button></div>
  </section>

</div>
</div>

<div class="modal-overlay" id="mgmt-modal" role="dialog" aria-modal="true" aria-labelledby="mgmt-title">
  <div class="modal">
    <button class="modal-close" id="btn-mgmt-close-x" aria-label="关闭">×</button>
    <div class="modal-sticky-top">
      <div class="mgmt-modal-heading">
        <h2 id="mgmt-title" style="margin-bottom:0;">管理角色</h2>
        <div class="mgmt-stats" id="mgmt-modal-stats"></div>
      </div>
      <p class="modal-desc">点击切换是否显示该角色</p>
      <div id="mgmt-toolbar-area"></div>
    </div>
    <div class="modal-scroll" id="mgmt-scroll">
      <div id="mgmt-grid" class="char-mgmt-grid"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="btn-mgmt-close">完成</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="customize-modal" role="dialog" aria-modal="true" aria-labelledby="customize-title">
  <div class="modal">
    <button class="modal-close" id="btn-customize-close-x" aria-label="关闭">×</button>
    <div class="modal-sticky-top">
      <h2 id="customize-title">设置点数</h2>
      <p class="modal-desc">调整每个角色可被使用的次数。归零后自动从角色池消失。</p>
    </div>
    <div class="modal-scroll">
      <div id="customize-grid" class="char-mgmt-grid"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="btn-customize-close">完成</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast" role="alert"></div>

<script src="data/js/data.generated.js"></script>
<script src="js/core/storage.js"></script>
<script src="js/data/loader.js"></script>
<script src="js/ui/theme.js"></script>
<script src="js/background/themed-background.js"></script>
<script src="js/script.js"></script>
<script src="js/interaction/drag.js"></script>
<script src="js/specks.js"></script>
</body>
</html>
